# mirrors_list.yaml
# Curated Iranian mirrors (Linux repos + PyPI/npm + Docker registries) for health-check tooling.
# Notes:
# - Some entries are "portal/docs" pages (not a direct repo root). Keep them if you want them listed, but your checker may mark them failed.
# - Use `packages:` mainly as tags; your script can decide what paths/tests to run per package type.

mirrors:
  # --- Mirava core list (geedook.github.io/mirava) ---
  - name: Iranrepo
    url: https://iranrepo.ir/
    description: Local mirror providing Debian/Ubuntu/Arch/PyPI.
    packages:
      - Debian
      - Ubuntu
      - Arch Linux
      - PyPI

  - name: KubarCloud
    url: https://mirrors.kubarcloud.com/
    description: Public software mirror hosted by Kubar Cloud (wide coverage).
    packages:
      - Alpine
      - Arch Linux
      - CentOS
      - Debian
      - Ubuntu
      - PyPI
      - npm

  - name: Shatel (mirror.shatel.ir)
    url: https://mirror.shatel.ir/
    description: Shatel mirror server (Ubuntu/Debian/Kali trees + rsync examples on site).
    packages:
      - Ubuntu
      - Debian
      - Kali Linux

  - name: ITO Portal
    url: https://repo-portal.ito.gov.ir/
    description: Government-backed repository portal (landing/portal).
    packages:
      - Debian
      - Ubuntu
      - PyPI
      - npm
      - Docker Registry

  - name: ITO Archive
    url: https://archive.ito.gov.ir/
    description: ITO archive host (direct repo roots like /debian/).
    packages:
      - Debian
      - Ubuntu
      - CentOS
      - Fedora
      - Rocky Linux
      - PyPI
      - npm

  - name: Jamko
    url: https://www.jamko.ir/
    description: Docs + configs for mirrors across ecosystems (endpoints may vary).
    packages:
      - Debian
      - Ubuntu
      - RPM
      - PyPI
      - npm
      - Yarn
      - Composer
      - Maven
      - Gradle

  - name: Runflare (docs)
    url: https://runflare.com/mirrors/
    description: Runflare mirrors documentation hub (multiple ecosystems).
    packages:
      - PyPI
      - npm
      - Node.js
      - Composer

  - name: Runflare PyPI (direct)
    url: https://mirror-pypi.runflare.com/
    description: Runflare PyPI mirror host.
    packages:
      - PyPI

  - name: EN Mirror
    url: https://en-mirror.ir/
    description: Gradle/Maven mirror for restricted networks.
    packages:
      - Maven Central
      - Google Maven
      - Jitpack Maven

  # --- Universities / large mirror hubs ---
  - name: IUT (Isfahan University of Technology)
    url: https://repo.iut.ac.ir/
    description: Broad university mirror (Debian/Ubuntu and many more).
    packages:
      - Debian
      - Ubuntu
      - Mint
      - Arch Linux
      - Manjaro
      - Raspbian
      - Alpine
      - Rocky Linux
      - Fedora
      - OpenSUSE
      - OpenBSD
      - CTAN

  - name: IranServer
    url: https://mirror.iranserver.com/
    description: IranServer mirror (Debian/Ubuntu/CentOS).
    packages:
      - Debian
      - Ubuntu
      - CentOS

  - name: MobinHost Mirror
    url: https://mirror.mobinhost.com/
    description: MobinHost software mirror (multi-distro).
    packages:
      - Ubuntu
      - Debian
      - Alpine
      - Arch Linux
      - Fedora
      - Fedora EPEL
      - CentOS
      - Almalinux
      - FreeBSD
      - Manjaro
      - MariaDB
      - MongoDB
      - Raspbian
      - Zabbix

  - name: 0-1 Cloud
    url: https://mirror.0-1.cloud/
    description: Multi-distro mirror hub (includes Ubuntu/Debian/CentOS/etc).
